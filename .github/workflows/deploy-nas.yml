# Autodeploy PDFAI a Synology NAS-ra: push main-re → SSH a NAS-ra → git pull + docker-compose up
name: Deploy to NAS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NAS_SSH_PRIVATE_KEY }}

      - name: Add NAS host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.NAS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on NAS (git pull + docker-compose up)
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
          NAS_PROJECT_PATH: ${{ secrets.NAS_PROJECT_PATH }}
        run: |
          REMOTE_PATH="${{ secrets.NAS_PROJECT_PATH }}"
          [ -z "$REMOTE_PATH" ] && REMOTE_PATH='~/PDFAI'
          ssh -o StrictHostKeyChecking=accept-new \
            "$NAS_USER@$NAS_HOST" \
            "cd \"$REMOTE_PATH\" && \
             git fetch origin && git reset --hard origin/main && \
             (docker compose version >/dev/null 2>&1 && docker compose pull --quiet || docker-compose pull --quiet || true) && \
             (docker compose version >/dev/null 2>&1 && docker compose up -d --build || docker-compose up -d --build)"
